<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPCForge — Aldea</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>

  <!-- ── Pantalla creación de personaje ── -->
  <div id="playerCreation">
    <div class="create-wrapper">
      <div class="create-logo">
        <span class="npc">NPC</span><span class="forge">Forge</span>
        <span class="game"> — Aldea</span>
      </div>
      <h2 class="create-title">Crea tu personaje</h2>
      <p class="create-sub">Este será tu avatar en la aldea.</p>
      <div id="playerEditorContainer" class="create-editor-wrap"></div>
      <div class="create-actions">
        <button class="btn btn-primary" onclick="confirmPlayer()">⚔ Empezar aventura</button>
        <a href="../index.html" class="btn btn-secondary">← Volver</a>
      </div>
    </div>
  </div>

  <!-- ── Contenedor del juego ── -->
  <div id="gameContainer" class="hidden">
    <div id="gameCanvas"></div>
    <div class="hud-hint">WASD / ↑←↓→ mover &nbsp;·&nbsp; E interactuar &nbsp;·&nbsp; ESC cerrar</div>
    <a href="../index.html" class="hud-back">← NPCForge</a>

    <!-- ── Panel de misiones ── -->
    <div id="missionsPanel" class="hidden">
      <div class="missions-header">
        <span class="missions-title">⚔ MISIONES</span>
        <span class="missions-npc-label">con <b id="missionsNpcName"></b></span>
        <span class="missions-counter" id="missionsCounter">0/3</span>
      </div>
      <div id="missionsList" class="missions-list"></div>
    </div>

    <div id="dialogOverlay" class="hidden">
      <div class="dialog-box">
        <div class="dialog-head">
          <img id="dialogNpcSprite" alt="sprite">
          <div>
            <p id="dialogNpcName"></p>
            <p id="dialogNpcArch"></p>
          </div>
          <button class="dialog-close" onclick="Dialog.close()">✕</button>
        </div>
        <div id="dialogHistory"></div>
        <div id="dialogOptions" class="dialog-options hidden"></div>
        <div class="dialog-input-row">
          <input type="text" id="dialogInput" placeholder="Di algo…" autocomplete="off"
            onkeydown="if(event.key==='Enter'){ event.stopPropagation(); Dialog.send(); }">
          <button onclick="Dialog.send()">→</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="js/missions.js"></script>
  <script src="js/stats.js"></script>
  <script src="../js/sprite-editor.js"></script>

  <script>
    window.preloadedImages = {};

    function loadImage(key, dataUrl) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload  = () => { window.preloadedImages[key] = img; resolve(); };
        img.onerror = () => resolve();
        img.src = dataUrl;
      });
    }

    async function _launchGame() {
      document.getElementById('playerCreation').classList.add('hidden');
      document.getElementById('gameContainer').classList.remove('hidden');

      const playerData = JSON.parse(localStorage.getItem('npcforge_player') || 'null');
      if (playerData?.spriteData) {
        await loadImage('player_spr', playerData.spriteData);
      }

      const npcs = Storage.getAll();
      await Promise.all(
        npcs.filter(n => n.spriteData).map(n => loadImage(`npc_${n.id}`, n.spriteData))
      );

      const phaserScript = document.createElement('script');
      phaserScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js';
      phaserScript.onload = () => {
        const dialogScript = document.createElement('script');
        dialogScript.src = 'js/dialog.js';
        dialogScript.onload = () => {
          const worldScript = document.createElement('script');
          worldScript.src = 'js/world.js';
          worldScript.onload = () => {
            new Phaser.Game({
              type:   Phaser.CANVAS,
              width:  window.innerWidth,
              height: window.innerHeight,
              pixelArt: true,
              backgroundColor: '#1a1830',
              parent: 'gameCanvas',
              scale: {
                mode:            Phaser.Scale.RESIZE,
                autoCenter:      Phaser.Scale.CENTER_BOTH,
              },
              physics: { default: 'arcade', arcade: { debug: false } },
              scene:   [WorldScene]
            });
          };
          document.body.appendChild(worldScript);
        };
        document.body.appendChild(dialogScript);
      };
      document.body.appendChild(phaserScript);
    }

    async function confirmPlayer() {
      const spriteData  = SpriteEditor.getSprite();
      const spriteState = SpriteEditor.getState();
      localStorage.setItem('npcforge_player', JSON.stringify({ spriteData, spriteState }));
      await _launchGame();
    }

    const savedPlayer = JSON.parse(localStorage.getItem('npcforge_player') || 'null');
    if (savedPlayer?.spriteData) {
      _launchGame();
    } else {
      SpriteEditor.mount(document.getElementById('playerEditorContainer'), null);
    }
  </script>

</body>
</html>
